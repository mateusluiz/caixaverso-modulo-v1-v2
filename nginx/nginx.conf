worker_processes 1;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;

    log_format simple_structured 'client_ip=$remote_addr '
                                 'method=$request_method '
                                 'status=$status '
                                 'upstream_response_time=$upstream_response_time '
                                 'uri="$request_uri"';

    access_log /var/log/nginx/access.log simple_structured;
    error_log /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_status 429;

    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=50m inactive=30s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1;
    gzip_types application/json text/plain;

    upstream finances_backend {
        server app1:8080;
        server app2:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 1m;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        error_page 404 /errors/404.html;

        error_page 502 503 504 /errors/50x.html;

        location = /errors/404.html {
            root /usr/share/nginx/html;
            internal;
        }

        location = /errors/50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        location / {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "1; mode=block" always;

            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 10s;
            proxy_cache_bypass $http_authorization;
            proxy_no_cache $http_authorization;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Upstream-Addr $upstream_addr always;

            proxy_intercept_errors on;

            proxy_pass http://finances_backend;
        }
    }
}
